<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#6c63ff"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e0f9f4;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background circle (maskable safe zone: content within inner 80%) -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Inner subtle ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <!-- "BB" monogram -->
  <text
    x="256"
    y="310"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="200"
    text-anchor="middle"
    fill="url(#text)"
    letter-spacing="-8"
  >BB</text>
  <!-- Small accent dot -->
  <circle cx="256" cy="380" r="16" fill="rgba(255,255,255,0.35)"/>
</svg>
